<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng vàng DKRS</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 15px;
      background: linear-gradient(135deg, #ff0000, #990000);
      color: white;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      max-width: 400px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      margin-bottom: 20px;
    }

    /* 🏆 TOP 3 */
    .top3 {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      color: black;
      border-radius: 15px;
      padding: 15px;
      width: 180px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 120px;              /* 👈 avatar to gấp đôi */
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: none;              /* 👈 bỏ viền trắng */
    }

    .gold { border-top: 8px solid gold; }
    .silver { border-top: 8px solid silver; }
    .bronze { border-top: 8px solid #cd7f32; }

    /* 📊 TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
    }

    th {
      background: #cc0000;
      color: white;
    }

    tr:nth-child(even) {
      background: #ffe5e5;
    }

    img.small {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
      vertical-align: middle;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {

      .top3 {
        flex-direction: column;
        align-items: center;
      }

      .card {
        width: 90%;
      }

      .card img {
        width: 100px;
        height: 100px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 7px;
      }
    }
  </style>
</head>

<body>

<h2>🏆 BẢNG VÀNG DKRS</h2>

<input type="text" id="search" placeholder="🔍 Tìm nhân viên...">

<div class="top3" id="top3"></div>

<table>
  <thead>
    <tr>
      <th>Rank</th>
      <th>Nhân viên</th>
      <th>Doanh thu</th>
      <th>Điểm</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSC9Bwn6k9ijqDCe5zM7cE9OSxc73ZQbNCZYtBBUDJpsVMkb7Zkct8za47U-PKP5OYvizU-tdc_RgfD/pub?output=csv";

const RATE = 10000;
let allData = [];

async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").slice(1).map(row => {
      const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // 👈 fix CSV

      return {
        name: cols[1] || "No name",
        revenue: Number(cols[2]) || 0,
        avatar: cols[3] || "",
        points: Math.floor((Number(cols[2]) || 0) / RATE)
      };
    });

    rows.sort((a, b) => b.points - a.points);

    allData = rows;

    renderTop3(rows.slice(0,3));
    render(rows);

  } catch (err) {
    console.error("Lỗi load data:", err);
  }
}

function renderTop3(top3) {
  const container = document.getElementById("top3");
  container.innerHTML = "";

  const classes = ["gold", "silver", "bronze"];

  top3.forEach((u, i) => {
    if (!u) return;

    const div = document.createElement("div");
    div.className = "card " + classes[i];

    div.innerHTML = `
      <h3>#${i+1}</h3>
      <img src="${u.avatar}" onerror="this.src='https://i.imgur.com/1X6vYQp.png'">
      <div><b>${u.name}</b></div>
      <div>${u.revenue.toLocaleString()} VND</div>
    `;

    container.appendChild(div);
  });
}

function render(data) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach((u, i) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${i+1}</td>
      <td>
        <img class="small" src="${u.avatar}" onerror="this.src='https://i.imgur.com/1X6vYQp.png'">
        ${u.name}
      </td>
      <td>${u.revenue.toLocaleString()}</td>
      <td>${u.points}</td>
    `;

    tbody.appendChild(tr);
  });
}

document.getElementById("search").addEventListener("input", function() {
  const keyword = this.value.toLowerCase();

  const filtered = allData.filter(u =>
    u.name.toLowerCase().includes(keyword)
  );

  renderTop3(filtered.slice(0,3));
  render(filtered);
});

loadData();

/* 🔄 Auto reload mỗi 30s */
setInterval(loadData, 30000);

</script>

</body>
</html>
