<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>BẢNG VÀNG DKRS</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      color: gold;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 60%;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    th {
      background: #222;
    }

    .up {
      color: #00ff99;
      font-weight: bold;
    }

    .down {
      color: #ff4d4f;
      font-weight: bold;
    }

    #notification {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #ff4d4f;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
      font-weight: bold;
      z-index: 9999;
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

<h1>🏆 BẢNG VÀNG DKRS</h1>

<table id="leaderboard">
  <thead>
    <tr>
      <th>Hạng</th>
      <th>Tên</th>
      <th>Điểm</th>
      <th>Biến động</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="notification"></div>

<script>
let currentData = [];

// 🔥 Giả lập API (bạn thay bằng fetch thật sau)
function getFakeData() {
  const names = ["A", "B", "C", "D", "E"];
  return names.map(name => ({
    name,
    score: Math.floor(Math.random() * 100)
  })).sort((a, b) => b.score - a.score);
}

// 📌 Render bảng
function renderLeaderboard(data, changes = {}) {
  const tbody = document.querySelector("#leaderboard tbody");
  tbody.innerHTML = "";

  data.forEach((item, index) => {
    const change = changes[item.name] || "";

    let changeClass = "";
    if (change === "up") changeClass = "up";
    if (change === "down") changeClass = "down";

    tbody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${item.name}</td>
        <td>${item.score}</td>
        <td class="${changeClass}">
          ${change === "up" ? "⬆️" : change === "down" ? "⬇️" : "-"}
        </td>
      </tr>
    `;
  });
}

// 📌 So sánh thay đổi
function detectChanges(oldData, newData) {
  let changes = {};
  let changed = false;

  newData.forEach((item, newIndex) => {
    const oldIndex = oldData.findIndex(x => x.name === item.name);

    if (oldIndex === -1) return;

    if (oldIndex > newIndex) {
      changes[item.name] = "up";
      changed = true;
    } else if (oldIndex < newIndex) {
      changes[item.name] = "down";
      changed = true;
    }
  });

  if (changed) {
    showNotification("⚡ Có thay đổi thứ hạng!");
    playSound();
  }

  return changes;
}

// 📌 Notification
function showNotification(message) {
  const noti = document.getElementById("notification");
  noti.innerText = message;
  noti.style.display = "block";

  setTimeout(() => {
    noti.style.display = "none";
  }, 3000);
}

// 🔊 Âm thanh
function playSound() {
  const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

// 📌 Lưu local
function saveData(data) {
  localStorage.setItem("leaderboard", JSON.stringify(data));
}

function getOldData() {
  return JSON.parse(localStorage.getItem("leaderboard")) || [];
}

// 🚀 Main loop (auto update mỗi 5s)
function updateLeaderboard() {
  const newData = getFakeData(); // 👉 thay bằng fetch API của bạn

  const oldData = getOldData();

  const changes = detectChanges(oldData, newData);

  renderLeaderboard(newData, changes);

  saveData(newData);
}

// chạy lần đầu
updateLeaderboard();

// auto reload
setInterval(updateLeaderboard, 5000);

</script>

</body>
</html>
